services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/src/config/.env
    volumes:
      - ./backend/firebase-key.json:/app/firebase-key.json
    ports:
      - "3000:3000"
    networks:
      - app-network
    command: npm run dev

  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge