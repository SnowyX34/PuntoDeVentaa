<nav class="bg-white shadow-md fixed top-0 left-0 w-full z-50">

    <div class="container mx-auto px-4 py-3">

        <div class="flex justify-between items-center">

            <!-- LOGO -->
            <a [routerLink]="['/home']" class="text-xl font-bold text-blue-600">
                MiTienda
            </a>

            <!-- BOTÓN HAMBURGUESA -->
            <button (click)="toggleMobileMenu()" class="md:hidden p-2 rounded-lg hover:bg-gray-100">

                <svg *ngIf="!mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>

                <svg *ngIf="mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>

            </button>

            <!-- MENÚ DESKTOP -->
            <div class="hidden md:flex items-center space-x-6">

                <a [routerLink]="['/productos']" routerLinkActive="text-blue-600 font-semibold"
                    class="text-gray-600 hover:text-blue-600">
                    Productos
                </a>

                <a [routerLink]="['/priceList']" class="text-gray-600 hover:text-blue-600">
                    Precios
                </a>

                <a *ngIf="userRole === 1 || userRole === 2" [routerLink]="['/orders']"
                    class="text-gray-600 hover:text-blue-600">
                    Ventas
                </a>

                <a *ngIf="userRole === 1 || userRole === 2" [routerLink]="['/salesHistory']"
                    class="text-gray-600 hover:text-blue-600">
                    Historial
                </a>

                <a *ngIf="userRole === 1 || userRole === 2" [routerLink]="['/reportes']"
                    class="text-gray-600 hover:text-blue-600">
                    Reportes
                </a>

            </div>

            <!-- ACCIONES -->
            <div class="hidden md:flex items-center space-x-4">

                            // <![CDATA[  <-- For SVG support
                            if ('WebSocket' in window) {
                                (function () {

                                        var head = document.getElementsByTagName("head")[0];
                                        for (var i = 0; i < sheets.length; ++i) {
                                            var elem = sheets[i];
                                            var parent = elem.parentElement || head;
                                            parent.removeChild(elem);
                                            var rel = elem.rel;
                                            if (elem.href && typeof rel != "string" || rel.length == 0 || rel.toLowerCase() == "stylesheet") {
                                                var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, '');
                                                elem.href = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cacheOverride=' + (new Date().valueOf());
                                            }

                                    }
                                    var protocol = window.location.protocol === 'http:' ? 'ws://' : 'wss://';

                    </svg>
                    <span *ngIf="cartCount > 0"
                        class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full px-2">
                        {{ cartCount }}
                    </span>
                </button>

                <!-- USUARIO -->
                <div *ngIf="isLoggedIn" class="relative">

                    <button (click)="toggleProfileMenu($event)"
                        class="flex items-center gap-2 hover:bg-gray-100 px-3 py-2 rounded-lg">

                        <div class="w-8 h-8 bg-blue-500 text-white rounded-full flex items-center justify-center">
                            {{ userName.charAt(0).toUpperCase() }}
                        </div>

                        <span class="hidden lg:block">{{ userName }}</span>

                    </button>

                    <!-- DROPDOWN -->
                    <div *ngIf="showProfileMenu"
                        class="absolute right-0 mt-2 w-56 bg-white border rounded-lg shadow-lg z-50">

                        <button (click)="goToProfile()" class="block w-full text-left px-4 py-2 hover:bg-gray-100">
                            Perfil
                        </button>

                        <button (click)="logout()"
                            class="block w-full text-left px-4 py-2 text-red-600 hover:bg-red-50">
                            Cerrar sesión
                        </button>

                    </div>
                </div>

            </div>
        </div>

        <!-- 📱 MENÚ MOBILE -->
        <div *ngIf="mobileMenuOpen" class="md:hidden mt-4 bg-white border-t pt-4 space-y-3">

            <a [routerLink]="['/productos']" (click)="closeMobileMenu()" class="block py-2 text-gray-700">
                Productos
            </a>

            <a [routerLink]="['/priceList']" (click)="closeMobileMenu()" class="block py-2 text-gray-700">
                Precios
            </a>

            <a *ngIf="userRole === 1 || userRole === 2" [routerLink]="['/orders']" (click)="closeMobileMenu()"
                class="block py-2 text-gray-700">
                Ventas
            </a>

            <a *ngIf="userRole === 1 || userRole === 2" [routerLink]="['/salesHistory']" (click)="closeMobileMenu()"
                class="block py-2 text-gray-700">
                Historial
            </a>

            <a *ngIf="userRole === 1 || userRole === 2" [routerLink]="['/reportes']" (click)="closeMobileMenu()"
                class="block py-2 text-gray-700">
                Reportes
            </a>

            <!-- CARRITO MOBILE -->
            <button (click)="goToCart()" class="w-full text-left py-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="21px" height="21px" viewBox="0 0 24 24">
                    <path
                        d="M6.787 15.981l14.11-1.008L23.141 6H5.345L5.06 4.37a1.51 1.51 0 0 0-1.307-1.23l-2.496-.286-.114.994 2.497.286a.502.502 0 0 1 .435.41l1.9 10.853-.826 1.301A1.497 1.497 0 0 0 6 18.94v.153a1.5 1.5 0 1 0 1 0V19h11.5a.497.497 0 0 1 .356.15 1.502 1.502 0 1 0 1.074-.08A1.497 1.497 0 0 0 18.5 18H6.416a.5.5 0 0 1-.422-.768zM19.5 21a.5.5 0 1 1 .5-.5.5.5 0 0 1-.5.5zm-13 0a.5.5 0 1 1 .5-.5.5.5 0 0 1-.5.5zM21.86 7l-1.757 7.027-13.188.942L5.52 7z" />
                    <path fill="none" d="M0 0h24v24H0z" /><!-- Code injected by live-server -->
                    <script>
                        // <![CDATA[  <-- For SVG support
                        if ('WebSocket' in window) {
                            (function () {
                                function refreshCSS() {
                                    var sheets = [].slice.call(document.getElementsByTagName("link"));
                                    var head = document.getElementsByTagName("head")[0];
                                    for (var i = 0; i < sheets.length; ++i) {
                                        var elem = sheets[i];
                                        var parent = elem.parentElement || head;
                                        parent.removeChild(elem);
                                        var rel = elem.rel;
                                        if (elem.href && typeof rel != "string" || rel.length == 0 || rel.toLowerCase() == "stylesheet") {
                                            var url = elem.href.replace(/(&|\?)_cacheOverride=\d+/, '');
                                            elem.href = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_cacheOverride=' + (new Date().valueOf());
                                        }
                                        parent.appendChild(elem);
                                    }
                                }
                                var protocol = window.location.protocol === 'http:' ? 'ws://' : 'wss://';
                                var address = protocol + window.location.host + window.location.pathname + '/ws';
                                var socket = new WebSocket(address);
                                socket.onmessage = function (msg) {
                                    if (msg.data == 'reload') window.location.reload();
                                    else if (msg.data == 'refreshcss') refreshCSS();
                                };
                                if (sessionStorage && !sessionStorage.getItem('IsThisFirstTime_Log_From_LiveServer')) {
                                    console.log('Live reload enabled.');
                                    sessionStorage.setItem('IsThisFirstTime_Log_From_LiveServer', true);
                                }
                            })();
                        }
                        else {
                            console.error('Upgrade your browser. This Browser is NOT supported WebSocket for Live-Reloading.');
                        }
                        // ]]>
                    </script>
                </svg>({{ cartCount }})
            </button>

            <!-- USUARIO MOBILE -->
            <div *ngIf="isLoggedIn" class="border-t pt-3">

                <p class="font-semibold">{{ userName }}</p>

                <button (click)="goToProfile()" class="block w-full text-left py-2">
                    Perfil
                </button>

                <button (click)="logout()" class="block w-full text-left py-2 text-red-600">
                    Cerrar sesión
                </button>

            </div>

            <div *ngIf="!isLoggedIn" class="space-y-2">

                <a [routerLink]="['/login']" class="block py-2 text-blue-600">
                    Iniciar sesión
                </a>

                <a [routerLink]="['/register']" class="block py-2 bg-blue-600 text-white text-center rounded">
                    Registrarse
                </a>

            </div>

        </div>

    </div>
</nav>
