<div class="bg-white rounded-xl shadow-lg overflow-hidden">
  <div class="bg-gradient-to-r from-purple-600 to-purple-700 px-6 py-4">
    <h3 class="text-xl font-bold text-white">Configurar Precios</h3>
    <p class="text-purple-100 text-sm">{{ product?.modelo || 'Producto' }}</p>
  </div>

  <div class="p-6">
    <!-- Precio base -->
    <div class="mb-6 p-4 bg-gray-50 rounded-lg">
      <div class="flex justify-between items-center">
        <div>
          <span class="text-2xl"></span>
          <span class="font-bold ml-2">Precio Regular</span>
        </div>
        <div class="flex items-center gap-2">
          <span>$</span>
          <input type="number" 
                 [(ngModel)]="regularPrice" 
                 class="w-32 text-right text-xl font-bold px-3 py-2 border rounded-lg">
        </div>
      </div>
    </div>

    <!-- Precios por nivel -->
    <div class="space-y-3">
      <div *ngFor="let tier of specialTiers" class="border rounded-lg">
        <div class="flex justify-between items-center p-4 cursor-pointer"
             (click)="toggleTier(tier.id)">
          <div>
            <span class="text-2xl">{{ tier.icon }}</span>
            <span class="font-bold ml-2">{{ tier.name }}</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-green-600 font-bold">${{ getPrice(tier.id).toFixed(2) }}</span>
            <div class="w-5 h-5 rounded-full" 
                 [ngClass]="getEnabled(tier.id) ? 'bg-green-500' : 'bg-gray-300'"></div>
          </div>
        </div>
        
        <div *ngIf="getEnabled(tier.id)" class="p-4 border-t bg-gray-50">
          <label class="block text-sm font-medium mb-1">Precio para {{ tier.name }}</label>
          <div class="flex items-center gap-2">
            <span>$</span>
            <input type="number" 
                   [value]="getPrice(tier.id)"
                   (input)="setPrice(tier.id, $event)"
                   class="flex-1 px-3 py-2 border rounded-lg">
          </div>
          <p class="text-xs text-gray-500 mt-1">
            Ahorro: ${{ (regularPrice - getPrice(tier.id)).toFixed(2) }}
          </p>
        </div>
      </div>
    </div>

    <!-- Botones -->
    <div class="mt-6 flex gap-3">
      <button (click)="resetPrices()" 
              class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">
        Restablecer
      </button>
      <button (click)="save()" 
              class="flex-1 px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
        Guardar Precios
      </button>
    </div>
  </div>
</div>
